

services:
  # Etapa 1: MySQL
  db:
    build:
      context: ./database
    container_name: jogosueca_db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - sueca_network

  # Etapa 2 e 4: Portal PHP
  www:
    build: 
      context: ./www
      dockerfile: Dockerfile
    container_name: jogosueca_portal
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./www:/var/www/html
    depends_on:
      - db
    networks:
      - sueca_network

  # Etapa 3 e 4: API Laravel
  api:
    build: 
      context: ./api
      dockerfile: Dockerfile
    container_name: jogosueca_api
    restart: always
    ports:
      - "8001:80"
    volumes:
      - ./api:/var/www/html
    depends_on:
      - db
    networks:
      - sueca_network

  cloudflared_app:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared_app
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
     - TUNNEL_TOKEN=${CLOUDFLARED_TUNNEL_TOKEN}
    network_mode: "host"
      
networks:
  sueca_network:
    driver: bridge

volumes:
  db_data: